name: Build & Test APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # ✅ Permitir ejecución manual desde la UI de GitHub

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx1536m"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # ✅ Necesario para análisis de cambios

    - name: Validate Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          echo "❌ Error crítico: gradlew no encontrado"
          echo "💡 Ejecuta localmente: ./gradlew wrapper --gradle-version=8.2"
          exit 1
        fi
        chmod +x gradlew
        ./gradlew --version

    - name: Set up JDK 17 (Temurin)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # ✅ Cache automático de dependencias

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: wrapper
        cache-read-only: ${{ github.ref != 'refs/heads/main' }}

    - name: Run unit tests
      run: ./gradlew test --stacktrace
      continue-on-error: true # ✅ No bloquear el build si hay tests fallidos en PR

    - name: Run lint check
      run: ./gradlew lintDebug --stacktrace
      continue-on-error: true

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Verify APK was built
      run: |
        if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "❌ APK no generado"
          exit 1
        fi
        ls -lh app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ecoguardian-alert-debug-${{ github.sha }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
        if-no-files-found: error

    # ✅ Build de release solo en main
    - name: Build Release APK (main branch only)
      if: github.ref == 'refs/heads/main'
      run: ./gradlew assembleRelease --stacktrace --no-daemon

    - name: Upload Release APK
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: ecoguardian-alert-release-${{ github.sha }}
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
