name: Build & Test APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx1536m"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ✅ Verificación robusta del wrapper
    - name: Check Gradle Wrapper
      id: check-wrapper
      run: |
        echo "🔍 Verificando archivos del wrapper..."
        echo "gradlew: $([ -f gradlew ] && echo '✅' || echo '❌')"
        echo "gradlew.bat: $([ -f gradlew.bat ] && echo '✅' || echo '❌')"
        echo "gradle-wrapper.jar: $([ -f gradle/wrapper/gradle-wrapper.jar ] && echo '✅' || echo '❌')"
        echo "gradle-wrapper.properties: $([ -f gradle/wrapper/gradle-wrapper.properties ] && echo '✅' || echo '❌')"
        
        if [ ! -f "gradlew" ]; then
          echo "❌ ERROR: gradlew no encontrado en el repositorio"
          echo "💡 Solución: Ejecuta localmente: ./gradlew wrapper --gradle-version=8.2"
          echo "💡 Luego: git add gradlew gradlew.bat gradle/wrapper/ && git push"
          exit 1
        fi
        chmod +x gradlew

    - name: Show Gradle version
      run: ./gradlew --version

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ecoguardian-alert-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
